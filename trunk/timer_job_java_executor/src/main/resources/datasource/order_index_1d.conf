input{
    file{
        path => ["/root/qwm/data/order_index_1d.csv"]
        start_position =>"beginning"
        #sincedb_path => "/data/sincedb_path/order_index_1d"
        }
}

filter{
    csv{
	autodetect_column_names => false
        #quote_char => "'"
        separator => ";"
        columns => ["phone_no","owner_name","optdate","prodname","sm_name","offerid","offername","business_name","owner_code","prodprcid","prodprcname","effdate","expdate","orderdate","cost","mode_time","prodstatus","run_name","orderno","offertype"]
        skip_header => false
        remove_field => ["message","path","host","@version","@timestamp"]
        }
}
output{
    elasticsearch{
        index => "order_index_v3"
        hosts => ["192.168.2.162:9200","192.168.111.76:9200","192.168.111.77:9200"]
    }
}
