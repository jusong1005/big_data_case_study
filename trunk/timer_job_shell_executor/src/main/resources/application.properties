# web port
server.port=8081

# log config
logging.config=classpath:logback.xml


### xxl-job admin address list, such as "http://address" or "http://address01,http://address02"
### use server3
xxl.job.admin.addresses=http://192.168.111.240:8083/admin

### xxl-job executor address
xxl.job.executor.appname=xxl-job-executor-shell
## node1
xxl.job.executor.ip=192.168.111.240
xxl.job.executor.port=9999

### xxl-job, access token
xxl.job.accessToken=

### xxl-job log path
xxl.job.executor.logpath=/tmp/applogs/xxl-job/jobhandler
### xxl-job log retention days
xxl.job.executor.logretentiondays=-1
