<section th:fragment="sidebar" class="sidebar">
    <ul class="sidebar-menu">
        <li><a href="../index.html" th:href="@{/}"> <i class="fa fa-home"></i> <span>首页</span></a></li>
        <li th:if="${(menu.scope eq '珠江数码') and (0 eq menu.parentId) and ('menu' eq menu.type)}"
            th:each="menu : ${resources}">
            <a href="#">
                <i class="fa fa-leaf"></i> <span th:text="${menu.name}">画像</span> <span
                    class="pull-right-container"> <i class="fa fa-angle-left pull-right"></i> </span>
            </a>
            <ul class="treeview-menu">
                <li th:if="${child.parentId eq menu.id and 'menu' eq child.type}"
                    th:each="child : ${resources}">
                    <a th:href="@{${child.url}}"><span th:text="${child.name}">用户画像</span></a>
                </li>
            </ul>
        </li>
    </ul>
</section>
