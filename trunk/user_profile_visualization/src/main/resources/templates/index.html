<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head lang="en" th:replace="fragments/header :: header"></head>
<body class="hold-transition skin-blue sidebar-mini">
<div class="wrapper" id="index">
    <div th:replace="fragments/mainHeader :: nav"></div>
    <aside class="main-sidebar">
        <div th:replace="fragments/mainSidebar :: sidebar"></div>
    </aside>

    <!-- ===== Dashboard Main ===== -->
    <div class="dashboard-container" id="app">

        <!-- Top Nav -->
        <nav class="top-nav">
            <div class="logo">
                <div class="logo-icon">BD</div>
                <span class="logo-text">广电大数据用户画像平台</span>
            </div>
            <div class="nav-info">
                <a href="screen" style="color:#22D3EE; text-decoration:none; border:1px solid rgba(34,211,238,0.3); padding:4px 14px; border-radius:6px; font-size:13px;">实时大屏</a>
                <span><span class="status-dot"></span>系统运行中</span>
                <span id="currentTime"></span>
            </div>
        </nav>

        <!-- KPI Cards -->
        <div class="kpi-grid" style="grid-template-columns: repeat(3, 1fr);">
            <div class="kpi-card">
                <div class="kpi-label">用户总量</div>
                <div class="kpi-value">2,463,779</div>
                <div class="kpi-sub">广州地区广电用户</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">画像标签数</div>
                <div class="kpi-value">9</div>
                <div class="kpi-sub">消费 / 行为 / 预测</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">SVM 模型准确率</div>
                <div class="kpi-value">79.25%</div>
                <div class="kpi-sub">AUC: 0.8223</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-card">
                <h3>用户画像查询</h3>
                <div class="search-row">
                    <input class="search-input" v-model="input_id" placeholder="请输入用户 ID（如 2463779）" @keyup.enter="open" />
                    <button class="btn btn-primary" v-on:click="open">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        用户画像
                    </button>
                    <button class="btn btn-secondary" v-on:click="labelDetail">标签详情</button>
                    <button class="btn btn-secondary" v-on:click="randomUser" title="随机选取一个用户">随机</button>
                </div>
                <div v-if="sampleUsers.length > 0" style="margin-top:12px; display:flex; flex-wrap:wrap; align-items:center; gap:6px;">
                    <span style="font-size:12px; color:#64748B;">示例用户：</span>
                    <span v-for="uid in sampleUsers" v-on:click="selectUser(uid)" style="font-size:12px; color:#3B82F6; cursor:pointer; padding:2px 8px; border-radius:4px; border:1px solid rgba(59,130,246,0.2); background:rgba(59,130,246,0.05);">{{uid}}</span>
                </div>
            </div>
        </div>

        <!-- Main Content Grid -->
        <div class="grid-2">
            <!-- Left: ECharts Graph -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><span class="dot"></span>用户标签知识图谱</div>
                    <span class="card-badge">ECharts</span>
                </div>
                <div class="card-body">
                    <div id="labelGraph" class="chart-container"></div>
                </div>
            </div>

            <!-- Right: User Profile Result -->
            <div class="card">
                <div class="card-header">
                    <div class="card-title"><span class="dot"></span>用户画像结果</div>
                    <span class="card-badge" v-show="isShow">已加载</span>
                </div>
                <div v-if="!hasSearched" class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                    <h4>请输入用户 ID 查询</h4>
                    <p>输入用户编号后点击"用户画像"查看完整标签</p>
                </div>
                <div v-if="hasSearched && profileLoading" class="loading-spinner">数据加载中...</div>
                <div v-if="hasSearched && !profileLoading && !isShow" class="empty-state">
                    <h4>未找到该用户</h4>
                    <p>用户 ID：{{input_id}} 没有查询结果</p>
                </div>
                <div v-if="hasSearched && !profileLoading && isShow">
                    <div class="profile-header">
                        <div class="profile-avatar">U</div>
                        <div class="profile-info">
                            <h3>用户 {{input_id}}</h3>
                            <p>广电宽带/电视用户</p>
                        </div>
                    </div>
                    <!-- Radar Chart -->
                    <div style="padding: 10px 20px;">
                        <div id="radarChart" style="width:100%; height:320px;"></div>
                    </div>
                    <div style="border-top: 1px solid #1E293B;"></div>
                    <!-- Tag Groups -->
                    <div class="tag-groups">
                        <div class="tag-group" v-for="name in cusporData.map.parentName">
                            <div class="tag-group-title">{{name}}</div>
                            <div class="tag-list">
                                <span class="tag" v-for="child in cusporData.map[name]">{{child}}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Label Detail Dialog -->
        <el-dialog title="用户标签详情" :visible.sync="innerVisible" width="70%" top="80px">
            <template>
                <el-table :data="labelDetails" style="width: 100%">
                    <el-table-column prop="phone_no" label="用户编号" width="180"></el-table-column>
                    <el-table-column prop="parent_label" label="父级标签" width="200"></el-table-column>
                    <el-table-column prop="label" label="标签"></el-table-column>
                </el-table>
            </template>
        </el-dialog>
    </div>

    <div class="control-sidebar-bg"></div>
</div>

<!-- Scripts -->
<div th:include="fragments/footer :: footer"></div>
<script>
// ===== Wait for DOM & libs =====
jQuery(function() {

// ===== ECharts 标签知识图谱（深色风格）=====
setTimeout(function() {
var labelGraph = echarts.init(document.getElementById('labelGraph'));
var graphOption = {
    backgroundColor: 'transparent',
    animationDuration: 1500,
    animationEasingUpdate: 'quinticInOut',
    series: [{
        type: 'graph',
        layout: 'force',
        roam: true,
        draggable: true,
        focusNodeAdjacency: true,
        force: {
            repulsion: 200,
            gravity: 0.05,
            edgeLength: [60, 120],
            layoutAnimation: true
        },
        label: {
            show: true,
            fontSize: 12,
            color: '#F8FAFC',
            fontWeight: 'bold'
        },
        lineStyle: { color: '#334155', width: 1.5, curveness: 0.15, opacity: 0.6 },
        emphasis: {
            lineStyle: { width: 3, color: '#3B82F6' },
            label: { fontSize: 14 }
        },
        edgeSymbol: ['none', 'arrow'],
        edgeSymbolSize: [0, 6],
        data: [
            // 中心节点
            { name: '用户画像', symbolSize: 70, symbol: 'circle',
              label: { color: '#fff', position: 'inside', fontSize: 14 },
              itemStyle: { color: '#1E40AF', shadowBlur: 20, shadowColor: 'rgba(59,130,246,0.5)' }
            },
            // 三大分类
            { name: '消费维度', symbolSize: 50, itemStyle: { color: '#22D3EE' }, label: { color: '#22D3EE' } },
            { name: '业务维度', symbolSize: 50, itemStyle: { color: '#F59E0B' }, label: { color: '#F59E0B' } },
            { name: '预测维度', symbolSize: 50, itemStyle: { color: '#22C55E' }, label: { color: '#22C55E' } },
            // 消费维度下的标签
            { name: '消费内容', symbolSize: 35, itemStyle: { color: '#0E7490' }, label: { fontSize: 11, color: '#94A3B8' } },
            { name: '电视消费水平', symbolSize: 35, itemStyle: { color: '#0E7490' }, label: { fontSize: 11, color: '#94A3B8' } },
            { name: '宽带消费水平', symbolSize: 35, itemStyle: { color: '#0E7490' }, label: { fontSize: 11, color: '#94A3B8' } },
            { name: '销售品名称', symbolSize: 35, itemStyle: { color: '#0E7490' }, label: { fontSize: 11, color: '#94A3B8' } },
            // 业务维度下的标签
            { name: '宽带产品带宽', symbolSize: 35, itemStyle: { color: '#92400E' }, label: { fontSize: 11, color: '#94A3B8' } },
            { name: '业务品牌', symbolSize: 35, itemStyle: { color: '#92400E' }, label: { fontSize: 11, color: '#94A3B8' } },
            { name: '电视入网程度', symbolSize: 35, itemStyle: { color: '#92400E' }, label: { fontSize: 11, color: '#94A3B8' } },
            { name: '宽带入网程度', symbolSize: 35, itemStyle: { color: '#92400E' }, label: { fontSize: 11, color: '#94A3B8' } },
            // 预测维度下的标签
            { name: '用户是否挽留', symbolSize: 35, itemStyle: { color: '#166534' }, label: { fontSize: 11, color: '#94A3B8' } }
        ],
        links: [
            { source: '用户画像', target: '消费维度' },
            { source: '用户画像', target: '业务维度' },
            { source: '用户画像', target: '预测维度' },
            { source: '消费维度', target: '消费内容' },
            { source: '消费维度', target: '电视消费水平' },
            { source: '消费维度', target: '宽带消费水平' },
            { source: '消费维度', target: '销售品名称' },
            { source: '业务维度', target: '宽带产品带宽' },
            { source: '业务维度', target: '业务品牌' },
            { source: '业务维度', target: '电视入网程度' },
            { source: '业务维度', target: '宽带入网程度' },
            { source: '预测维度', target: '用户是否挽留' }
        ]
    }]
};
labelGraph.setOption(graphOption);
window.addEventListener('resize', function() { labelGraph.resize(); });
}, 500); // end setTimeout for ECharts

// ===== Vue App =====
new Vue({
    el: "#app",
    data() {
        return {
            input_id: '2463779',
            innerVisible: false,
            profileLoading: false,
            hasSearched: false,
            labelDetails: [],
            cusporData: { map: { parentName: [] } },
            isShow: false,
            sampleUsers: [2698243, 2503628, 2584195, 2981237, 4199968, 2979579, 4168489, 4175823, 2825733, 4282006],
        }
    },
    methods: {
        selectUser(uid) {
            this.input_id = String(uid);
            this.open();
        },
        randomUser() {
            if (this.sampleUsers.length > 0) {
                var idx = Math.floor(Math.random() * this.sampleUsers.length);
                this.selectUser(this.sampleUsers[idx]);
            }
        },
        labelDetail() {
            var _self = this;
            var id = this.input_id;
            if (isNaN(id) || !id.trim().length > 0) {
                alert("用户ID不能为空并且是数字类型");
            } else {
                $.ajax({
                    url: 'labels/user/' + id,
                    method: "get",
                    contentType: "application/json;charset=UTF-8",
                    success: function(data) {
                        _self.labelDetails = data;
                        _self.innerVisible = true;
                    }
                });
            }
        },
        open() {
            var id = this.input_id;
            if (isNaN(id) || !id.trim().length > 0) {
                alert("用户ID不能为空并且是数字类型");
            } else {
                this.hasSearched = true;
                this.profileLoading = true;
                var that = this;
                $.ajax({
                    url: 'labels/users/' + id + '/all/',
                    method: "get",
                    contentType: "application/json;charset=UTF-8",
                    success: function(res) {
                        that.cusporData = res.data;
                        that.cusporData.map = res.data;
                        if (that.cusporData.map["isNull"]) {
                            that.isShow = false;
                        } else {
                            that.isShow = true;
                        }
                        that.formatData(that.cusporData);
                        that.profileLoading = false;
                        // Render radar chart after DOM update
                        that.$nextTick(function() {
                            setTimeout(function() { that.renderRadar(); }, 300);
                        });
                    },
                    error: function() {
                        that.profileLoading = false;
                    }
                });
            }
        },
        formatData(data) {
            if (data.map != null) {
                var parentNames = data.map.parentName;
                parentNames.forEach(function(parentName) {
                    if (data.map[parentName].length == 0) {
                        data.map[parentName].push("无");
                    }
                });
            }
        },
        renderRadar() {
            var el = document.getElementById('radarChart');
            if (!el) return;
            var chart = echarts.init(el);
            var map = this.cusporData.map;
            var names = map.parentName || [];
            var scoreMap = {
                '高': 3, '中': 2, '低': 1,
                '深度': 3, '中度': 2, '浅度': 1,
                '是': 3, '否': 1,
                '电视': 2, '宽带': 2, '融合': 3,
                '200M及以上': 4, '100M': 3, '50M': 2, '20M': 1,
                '高清互动': 3, '4K超清': 4, '标清互动': 2,
                '畅享包': 3, '高清包': 3, '4K包': 4
            };
            var maxMap = {
                '消费内容': 3, '电视消费水平': 3, '宽带消费水平': 3,
                '宽带产品带宽': 4, '用户是否挽留': 3, '业务品牌': 4,
                '电视入网程度': 3, '宽带入网程度': 3, '销售品名称': 4
            };
            var indicators = [];
            var values = [];
            names.forEach(function(name) {
                var maxVal = maxMap[name] || 3;
                indicators.push({ name: name, max: maxVal });
                var labels = map[name] || [];
                var score = 0;
                labels.forEach(function(l) {
                    var s = scoreMap[l];
                    if (s && s > score) score = s;
                });
                if (score === 0 && labels.length > 0 && labels[0] !== '无') score = 2;
                values.push(score);
            });
            chart.setOption({
                backgroundColor: 'transparent',
                radar: {
                    indicator: indicators,
                    shape: 'polygon',
                    radius: '65%',
                    name: { textStyle: { color: '#94A3B8', fontSize: 11 } },
                    splitArea: { areaStyle: { color: ['rgba(59,130,246,0.02)', 'rgba(59,130,246,0.04)', 'rgba(59,130,246,0.06)', 'rgba(59,130,246,0.08)'] } },
                    axisLine: { lineStyle: { color: '#1E293B' } },
                    splitLine: { lineStyle: { color: '#1E293B' } }
                },
                series: [{
                    type: 'radar',
                    data: [{
                        value: values,
                        name: '用户画像',
                        areaStyle: { color: 'rgba(34,211,238,0.15)' },
                        lineStyle: { color: '#22D3EE', width: 2 },
                        itemStyle: { color: '#22D3EE' },
                        symbol: 'circle',
                        symbolSize: 6
                    }]
                }]
            });
            window.addEventListener('resize', function() { chart.resize(); });
        }
    }
});

// ===== Clock =====
function updateTime() {
    var now = new Date();
    var str = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0') + ':' + String(now.getSeconds()).padStart(2,'0');
    var el = document.getElementById('currentTime');
    if (el) el.textContent = str;
}
updateTime();
setInterval(updateTime, 1000);

}); // end jQuery ready
</script>
</body>
</html>
