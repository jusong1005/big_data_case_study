#开发环境
name: media

server:
  servlet:
    context-path: /user_profile
    session:
      cookie:
        domain: localhost
  port: 8001
  config:
    auth:
      #是否启用权限验证
      enabled: false

#loginUrl



spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:big_data_case_study}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:bigdata}
    password: ${MYSQL_PASSWORD:BigData@123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
#    name: datasource
  jpa:
    show-sql: false
    open-in-view: false
    hibernate:
      ddl-auto: none
  thymeleaf:
  #    prefix: classpath:/templates/
  #    suffix: .html
  #    enabled: true
    mode: HTML

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s

  session:
    store-type: none



